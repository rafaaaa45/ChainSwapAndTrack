name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: chainguard
          POSTGRES_PASSWORD: chainguard
          POSTGRES_DB: chainguard_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U chainguard" --health-interval=10s --health-timeout=5s --health-retries=5
    env:
      DATABASE_URL: postgres://chainguard:chainguard@localhost:5432/chainguard_db
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            nc -z localhost 5432 && echo "Postgres is up" && break
            sleep 2
          done
      - name: Run DB setup
        run: node database/setup.js
      - name: Lint
        run: npm run lint || true
      - name: Run tests
        run: npm test
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Docker image
        run: docker build -t rafaaaa45/chainguard_project:latest .
      - name: Push Docker image
        run: docker push rafaaaa45/chainguard_project:latest
          docker stop chainguard_app || true
          docker rm chainguard_app || true
          docker run -d --name chainguard_app -p 3000:3000 --env-file /path/to/.env rafaaaa45/chainguard_project:latest
