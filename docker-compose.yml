version: '3.8'
services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: chainguard
      POSTGRES_PASSWORD: chainguard
      POSTGRES_DB: chainguard_db
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainguard -d chainguard_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "node database/setup.js && node server.js"
    environment:
      DATABASE_URL: postgres://chainguard:chainguard@postgres:5432/chainguard_db
    ports:
      - "3000:3000"
    env_file:
      - .env

volumes:
  pgdata: