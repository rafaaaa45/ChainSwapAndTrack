version: '3.8'
services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: chainguard
      POSTGRES_PASSWORD: chainguard
      POSTGRES_DB: chainguard_db
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  app:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://chainguard:chainguard@postgres:5432/chainguard_db
    ports:
      - "3000:3000"
    env_file:
      - .env
volumes:
  pgdata:
